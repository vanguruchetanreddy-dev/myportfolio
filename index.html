<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        body {
            margin: 0;
            background-color: #252222;
            background-image: radial-gradient(circle, #3a3535 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .navi{
            background-color: black;
            padding: 20px;
            height: 30px;
        }

        .cont{
            background-color: white;
            color: black;
            font-weight: bold;
            border-radius: 17px;
            padding:8px 16px;
            margin-left:10px;
            text-decoration:none;
            float:right;
        }

        .logo{
            color:white;
            font-size:26px;
            font-weight:bold;
            float:left;
        }

        .introtext{
            color:white;
            float:left;
            width:50%;
            padding:2px;
        }

        .introtext h2{
            font-size:28px;
        }

        .introtext h1{
            font-size:60px;
        }

        .introtext p{
            font-size:22px;
        }

        @keyframes fadedown {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .navi {
            animation: fadedown 0.6s ease;
        }

        .introtext {
            animation: fadedown 0.7s ease 0.2s both;
        }

        .profile-card {
            animation: fadedown 0.7s ease 0.3s both;
        }

        .aboutbox {
            animation: fadedown 0.7s ease 0.5s both;
        }

        footer {
            animation: fadedown 0.7s ease 0.6s both;
        }
    </style>
</head>
<body>
    <div class="navi">
        <div class="logo"> Vanguru Chetan Reddy  │ </div>
        <a class="cont" href="contact.html">Contact</a>

            <h2 class="card-name">Vanguru Chetan Reddy</h2>
            <p class="card-title">B.Tech CS Student</p>
            <div class="social-icons">
                <a href="https://www.instagram.com/chetanreddy.vanguru/" target="_blank">
                    <img src="https://cdn.simpleicons.org/instagram/white" alt="Instagram" width="24">
                </a>
                <a href="https://x.com/ChetanVanguru" target="_blank">

    <div class="aboutbox">
        More About Me
        <a href="about.html" class="arrow">➔</a>
    </div>
